<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>test maker</title>
    <link rel="stylesheet" href="dist/test_maker.css">
    <script src="https://kit.fontawesome.com/636db4ca92.js" crossorigin="anonymous"></script>
</head>
<body>

<main>
    <section class="variant-select-wrapper">
        <header>Varianty</header>

        <div class="content">
            <button id="add_test">add test </button>
        </div>
    </section>

    <section class="question-select-wrapper">
        <header>Otázky</header>

        <div id="question_display" class="content">
            <div class="subject">
                <span> Subject </span>
            </div>
            <div class="category">
                <span> Category </span>
            </div>
        </div>
    </section>

    <section class="preview-wrapper">
        <header>Ukázka vybrané varianty</header>

        <div class="content">
            <button id="send">send</button>
        </div>
    </section>
</main>

<script type="module" src="dist/preview_manager.js"></script>
<script type="module" src="dist/question_fetch.js"></script>
<script type="module"  src="dist/send_test.js"></script>
</body>
</html>
